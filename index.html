<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Dashboard Templates</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0b1220;
      color: #fff;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: #d7f0f0;
      border-radius: 16px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      color: #111;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 1.2rem;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #111;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.3s;
    }

    .card a:hover {
      background: #ff0077;
    }
  </style>
</head>
<body>
  <h1>IoT Dashboard Templates</h1>

  <div class="grid">

    <!-- CARD TEMPLATE -->
    <!-- Duplicate and update links/images -->

    <div class="card">
      <img src="images/colorful.png" alt="colorful">
      <div class="card-content">
        <h3>Colorful Dashboard</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/colorful/index.html" target="_blank" rel="noopener noreferrer"> View Demo </a>      
  </div>
    </div>

    <div class="card">
      <img src="images/colorful-chart.png" alt="Colorful-Chart">
      <div class="card-content">
        <h3>Colorful-Chart</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/colorful/index-chart.html" target="_blank" rel="noopener noreferrer"> View Demo </a>      
      </div>
    </div>

    <div class="card">
      <img src="images/dark-modern.png" alt="Dark Modern">
      <div class="card-content">
        <h3>Dark Modern</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/dark-modern/index.html" target="_blank" rel="noopener noreferrer"> View Demo </a> 
      </div>
    </div>

    <div class="card">
      <img src="images/ex-dark-modern.png" alt="Dark Modern">
      <div class="card-content">
        <h3>Expanded Dark Modern</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/dark-modern-2/index.html" target="_blank" rel="noopener noreferrer"> View Demo </a> 
      </div>
    </div>

    <div class="card">
      <img src="images/light-clean.png" alt="light-clean">
      <div class="card-content">
        <h3>Light Clean</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/light-clean/index.html" target="_blank" rel="noopener noreferrer"> View Demo </a> 
      </div>
    </div>

    <div class="card">
      <img src="images/minimal-grid.png" alt="Minimal Grid">
      <div class="card-content">
        <h3>Minimal Grid</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/minimal-grid/index.html" target="_blank" rel="noopener noreferrer" > View Demo</a>
      </div>
    </div>

    <div class="card">
      <img src="images/plant.png" alt="Plant Monitor">
      <div class="card-content">
        <h3>Plant Monitor</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/plant-monitor/index.html" target="_blank" rel="noopener noreferrer" > View Demo</a>
      </div>
    </div>

    <div class="card">
      <img src="images/plant-chart.png" alt="Plant Chart">
      <div class="card-content">
        <h3>Plant Monitor Chart</h3>
        <a href="https://iot-templates-cits.s3.us-east-2.amazonaws.com/plant-monitor/chart-index.html" target="_blank" rel="noopener noreferrer" > View Demo</a>
      </div>
    </div>

  </div>
</body>
</html>
